name: CI

# Intégration continue : build, vérifications statiques et tests
# Déclenchée sur les push et les pull requests vers master.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # La version de Go est lue depuis go.mod (source unique de vérité).
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Vérifie que go.mod / go.sum sont cohérents et à jour.
      - name: Verify modules
        run: |
          go mod download
          go mod verify

      # Échoue si du code n'est pas formaté avec gofmt.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Fichiers non formatés (lancez 'gofmt -w .') :"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  vulncheck:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    # Non-bloquant : certaines CVE de github.com/docker/docker sont « Fixed in: N/A »
    # (aucun correctif amont), donc impossibles à résoudre. Le job informe sans
    # faire échouer la CI ; à repasser bloquant quand ces CVE seront corrigées.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Scan les CVE des dépendances en ne signalant que celles réellement
      # atteignables depuis le code (peu de faux positifs).
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    # Non-bloquant : golangci-lint peut avoir du retard sur les versions récentes
    # de Go (1.26). Le job informe sans faire échouer la CI.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
