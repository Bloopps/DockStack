# Configuration GoReleaser : compilation multi-plateforme et publication
# d'une GitHub Release lors d'un tag « v* ».
# Doc : https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dockstack
    main: ./cmd/dockstack
    binary: dockstack
    env:
      - CGO_ENABLED=0
    # DockStack est Linux-only (métriques via /proc, statfs_linux.go).
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: dockstack
    # Binaires bruts (pas de .tar.gz) pour rester compatible avec la commande
    # d'installation du README : curl .../dockstack-linux-amd64
    formats: [binary]
    name_template: 'dockstack-{{ .Os }}-{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  # Regroupe les commits par catégorie dans les notes de version.
  groups:
    - title: 'Nouveautés'
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: 'Corrections'
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: 'Autres changements'
      order: 999
  filters:
    # Exclut le bruit du changelog généré.
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - 'merge conflict'

# Bloc fixe ajouté en pied de chaque release (instructions d'installation).
release:
  footer: |
    ## Installation

    Binaire statique linux/amd64, sans dépendance :

    ```bash
    curl -L https://github.com/Bloopps/DockStack/releases/latest/download/dockstack-linux-amd64 -o dockstack
    chmod +x dockstack
    ./dockstack
    ```
